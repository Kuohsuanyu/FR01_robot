pre-commit:
  parallel: true  # 🚀 Run commands in parallel for speed
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
      stage_fixed: true  # Auto-stage fixed files
    
    clippy:
      glob: "*.rs" 
      run: cargo clippy --all-targets --all-features -- -D warnings
